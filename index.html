<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GVS COMPUTER CENTER</title>
  <style>
    /* Your styles here */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7fbff, #eef6ff, #ffffff);
      color: #111;
      text-align: center;
      overflow-x: hidden;
    }
    /* Other styles here */
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="apply-box" onclick="openForm()">Forms Apply</div>
  <div id="resultBtn" class="result-box disabled" onclick="openResultSearch()">Result</div>
</div>

<!-- Main Page -->
<div id="mainPage">
  <div class="header">
    <h1>GVS COMPUTER CENTER</h1>
  </div>

  <div class="course-box">
    <h2>Courses</h2>
    <ul>
      <li>CCC</li>
      <li>D.C.A.</li>
      <li>ADCA</li>
      <li>PGDCA</li>
      <li>BCC</li>
      <li>DTP</li>
      <!-- Add other courses -->
    </ul>
  </div>
</div>

<!-- Form Page -->
<div id="formPage">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>

  <div class="container">
    <div class="title">GVS COMPUTER CENTER</div>
    <div class="header2">Student Details</div>

    <!-- Submit message area -->
    <div id="submitMsg" style="display:none; margin-top:12px;"></div>

    <form id="studentForm">
      <div class="form-row">
        <div class="form-group">
          <label>Roll No. *</label>
          <input id="rollNoInput" type="text" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Student Full Name *</label>
          <input id="studentName" type="text" required />
        </div>
        <div class="form-group">
          <label>Session *</label>
          <select id="session" required>
            <option value="">Select Session</option>
            <option>2023-24</option>
            <option>2024-25</option>
          </select>
        </div>
      </div>

      <!-- More form fields like Course type, Father name, Mobile etc. -->

      <button class="submit-btn" type="submit">SUBMIT</button>
    </form>
  </div>
</div>

<!-- Result Search Page -->
<div id="resultSearchPage">
  <button class="back-btn" onclick="backFromResult()">⬅ Back</button>

  <div class="container">
    <div class="title">GVS COMPUTER CENTER</div>
    <div class="header2">Result</div>

    <form id="resultSearchForm">
      <div class="form-row">
        <div class="form-group">
          <label>Student Name *</label>
          <input id="searchName" type="text" required />
        </div>
        <div class="form-group">
          <label>Roll No. *</label>
          <input id="searchRoll" type="text" required />
        </div>
      </div>

      <button class="submit-btn" type="submit">SEARCH</button>
    </form>

    <div id="resultOutput"></div>
  </div>
</div>

<script>
// JavaScript to handle form submission and result search
document.getElementById("studentForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = {
    rollNo: document.getElementById("rollNoInput").value.trim(),
    name: document.getElementById("studentName").value.trim(),
    session: document.getElementById("session").value.trim(),
    // other form data...
  };

  fetch("submit_form.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(formData)
  })
  .then(response => response.json())
  .then(data => {
    if (data.status === "success") {
      alert("Form submitted successfully!");
      document.getElementById("studentForm").reset(); // Reset form after submission
    } else {
      alert("Error: " + data.message);
    }
  })
  .catch(error => {
    console.error("Error submitting form:", error);
  });
});

document.getElementById("resultSearchForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("searchName").value.trim().toLowerCase();
  const roll = document.getElementById("searchRoll").value.trim().toLowerCase();

  fetch("search_result.php", { // Create this PHP file for result search
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, roll })
  })
  .then(response => response.json())
  .then(data => {
    if (data.status === "success") {
      document.getElementById("resultOutput").innerHTML = `
        <div class="result-card">
          <div class="badge">Result Found ✅</div>
          <div class="row"><b>Name:</b> ${data.name}</div>
          <div class="row"><b>Roll No:</b> ${data.rollNo}</div>
          <!-- Add other details here -->
        </div>
      `;
    } else {
      document.getElementById("resultOutput").innerHTML = `
        <div class="result-card">
          <div class="badge">Not Found ❌</div>
        </div>
      `;
    }
  })
  .catch(error => {
    console.error("Error searching result:", error);
  });
});
</script>

</body>
</html>
